spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# senha literal apenas para nao deixar o placeholder ${DB_PASSWORD} sem resolucao;
# a conexao real vem do container via @ServiceConnection
spring.datasource.password=testcontainers

# pool folgado para os testes de concorrencia nao esbarrarem em exaustao de conexoes
spring.datasource.hikari.maximum-pool-size=30
