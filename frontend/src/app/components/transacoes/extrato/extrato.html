<app-layout-banco>
  <header class="hero" layout-cabecalho>
    <div class="hero__top">
      <button class="icon-btn" type="button" (click)="voltar()" aria-label="Voltar">
        <app-icone nome="seta-esquerda" [tamanho]="22" />
      </button>

      <img class="hero__logo" src="logo-foursys.png" alt="foursys" />

      <button class="icon-btn" type="button" aria-label="Buscar">
        <app-icone nome="buscar" [tamanho]="22" />
      </button>
    </div>

    <h1 class="hero__titulo">Extrato</h1>

    <nav class="pills">
      <a class="pill" routerLink="/pix">PIX</a>
      <a class="pill" routerLink="/deposito">Depósito</a>
      <a class="pill" routerLink="/saque">Saque</a>
      <a class="pill pill--ativa" routerLink="/extrato">Extrato</a>
    </nav>

    <app-extrato-resumo
      [inicio]="periodoInicio()"
      [fim]="periodoFim()"
      [total]="transacoes().length"
    />
  </header>

  <section class="lista" layout-conteudo>
    @if (carregando()) {
      <p class="aviso">Carregando...</p>
    } @else if (erro(); as mensagem) {
      <p class="aviso aviso--erro">{{ mensagem }}</p>
    } @else if (transacoes().length === 0) {
      <p class="aviso">Nenhuma transação encontrada.</p>
    } @else {
      @for (transacao of transacoes(); track transacao.tokenTransacao) {
        <app-transacao-item [transacao]="transacao" [numeroContaAtual]="numeroContaAtual()" />
      }
    }
  </section>

  <app-bottom-nav layout-navegacao />
</app-layout-banco>
