<header class="hero">
  <div class="hero__top">
    <button class="icon-btn" type="button" aria-label="Buscar">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7" />
        <path d="m20 20-3-3" stroke-linecap="round" />
      </svg>
    </button>

    <img class="hero__logo" src="logo-foursys.png" alt="foursys" />

    <button class="icon-btn icon-btn--bell" type="button" aria-label="Notificacoes">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9a6 6 0 0 1 12 0c0 6 2 7 2 7H4s2-1 2-7" stroke-linejoin="round" />
        <path d="M10 20a2 2 0 0 0 4 0" stroke-linecap="round" />
      </svg>
      <span class="badge"></span>
    </button>
  </div>

  <div class="hero__saldo">
    <div class="hero__saldo-label">
      <span>Saldo total</span>
      <button
        class="eye"
        type="button"
        (click)="alternarSaldo()"
        [attr.aria-label]="saldoVisivel() ? 'Ocultar saldo' : 'Mostrar saldo'"
      >
        @if (saldoVisivel()) {
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 12s3.5-7 10-7a10 10 0 0 1 5 1.4M22 12s-3.5 7-10 7a10 10 0 0 1-5-1.4" />
            <path d="m3 3 18 18" stroke-linecap="round" />
          </svg>
        }
      </button>
    </div>

    <p class="hero__valor">
      @if (saldoVisivel()) {
        {{ saldo() | currency: 'BRL' : 'symbol' : '1.2-2' }}
      } @else {
        R$ ●●●●●●
      }
    </p>

    <p class="hero__limite">
      Saldo + Limite:
      <strong>{{ saldo() | currency: 'BRL' : 'symbol' : '1.2-2' }}</strong>
    </p>

    <a class="btn-extrato" routerLink="/transacoes/extrato">Acessar extrato</a>
  </div>

  <div class="hero__acoes">
    <a class="acao" routerLink="/transacoes/pix">
      <span class="acao__ic">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 2.6 21.4 12 12 21.4 2.6 12 12 2.6Zm0 3.4L6 12l6 6 6-6-6-6Z" />
        </svg>
      </span>
      <span class="acao__txt">Pix</span>
    </a>

    <a class="acao" routerLink="/transacoes/deposito">
      <span class="acao__ic">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="4" y="3" width="16" height="18" rx="2" />
          <path
            d="M8 8h8M12 11v6M10 12.5a2 2 0 0 0 4 .5c0-1.5-4-1-4-2.5a2 2 0 0 1 4-.5"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="acao__txt">Pagar</span>
    </a>

    <button class="acao" type="button">
      <span class="acao__ic">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <path d="M2 10h20" />
        </svg>
      </span>
      <span class="acao__txt">Cartões</span>
    </button>
  </div>
</header>
