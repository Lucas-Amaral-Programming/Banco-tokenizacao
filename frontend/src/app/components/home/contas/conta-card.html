<button class="conta" type="button">
  <span class="conta__ic">
    <app-icone nome="cardholder" [tamanho]="22" />
  </span>

  <span class="conta__info">
    <span class="conta__nome">{{ rotulosTipo[conta().tipoConta] }}</span>
    <span class="conta__meta">Cc {{ conta().numeroConta }}</span>
  </span>

  <span class="conta__saldo">
    @if (saldoVisivel()) {
      {{ conta().saldoConta | currency: 'BRL' : 'symbol' : '1.2-2' }}
    } @else {
      R$ ●●●●
    }
  </span>

  <svg
    class="conta__chevron"
    viewBox="0 0 24 24"
    width="20"
    height="20"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <path d="m9 6 6 6-6 6" stroke-linecap="round" />
  </svg>
</button>
