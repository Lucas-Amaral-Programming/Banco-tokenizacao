<section class="secao">
  <header class="secao__head">
    <h2 class="secao__titulo">Meus cartões</h2>
    <button class="secao__link" type="button">Ver todos</button>
  </header>

  <button class="cartao" type="button">
    <span class="mini">
      <img class="mini__logo" src="logo-foursys.png" alt="foursys" />
      <span class="mini__num">•••• {{ cartao.final }}</span>
      <span class="mini__band" aria-hidden="true">
        <span class="mini__band-a"></span>
        <span class="mini__band-b"></span>
      </span>
    </span>

    <span class="cartao__info">
      <span class="cartao__nome">{{ cartao.nome }}</span>
      <span class="cartao__meta">Crédito • Final {{ cartao.final }}</span>
      <span class="cartao__fatura">
        Fatura atual
        <strong>{{ cartao.faturaAtual | currency: 'BRL' : 'symbol' : '1.2-2' }}</strong>
      </span>
    </span>

    <svg
      class="cartao__chevron"
      viewBox="0 0 24 24"
      width="20"
      height="20"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="m9 6 6 6-6 6" stroke-linecap="round" />
    </svg>
  </button>
</section>
