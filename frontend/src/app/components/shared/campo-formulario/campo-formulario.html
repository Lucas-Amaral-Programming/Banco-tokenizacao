<label class="campo">
  <span class="rotulo">{{ rotulo() }}</span>

  <span class="entrada">
    <svg class="icone-campo" viewBox="0 0 24 24" aria-hidden="true">
      @switch (icone()) {
        @case ('usuario') {
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
        }
        @case ('documento') {
          <rect x="3" y="5" width="18" height="14" rx="2" />
          <path d="M7 10h4M7 14h6" />
        }
        @case ('banco') {
          <path d="M3 21h18M5 21V10l7-5 7 5v11M9 21v-6h6v6" />
        }
        @case ('cadeado') {
          <rect x="5" y="11" width="14" height="9" rx="2" />
          <path d="M8 11V8a4 4 0 018 0v3" />
        }
        @case ('email') {
          <rect x="3" y="5" width="18" height="14" rx="2" />
          <path d="M3 7l9 6 9-6" />
        }
        @case ('celular') {
          <rect x="7" y="3" width="10" height="18" rx="2" />
          <path d="M11 18h2" />
        }
      }
    </svg>

    @if (tipo() === 'select') {
      <select [value]="valor()" (change)="atualizar($event)">
        @for (opcao of opcoes(); track opcao) {
          <option [value]="opcao">{{ opcao }}</option>
        }
      </select>
    } @else {
      <input [type]="tipoInput" [value]="valor()" (input)="atualizar($event)"
             [placeholder]="placeholder()"
             [attr.inputmode]="mascara() === 'cpf' || mascara() === 'celular' || mascara() === 'moeda' ? 'numeric' : null"
             [attr.maxlength]="mascara() === 'cpf' ? 14 : mascara() === 'celular' ? 15 : mascara() === 'moeda' ? 20 : null" />
    }

    @if (tipo() === 'senha') {
      <button type="button" class="olho" (click)="alternarSenha()"
              [attr.aria-label]="mostrarSenha() ? 'Ocultar senha' : 'Mostrar senha'">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
          <circle cx="12" cy="12" r="3" />
          @if (mostrarSenha()) {
            <path d="M3 3l18 18" />
          }
        </svg>
      </button>
    }
  </span>

  @if (ajuda()) {
    <span class="ajuda">{{ ajuda() }}</span>
  }
</label>
